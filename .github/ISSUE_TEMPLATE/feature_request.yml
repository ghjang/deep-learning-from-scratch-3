name: ✨ 기능 / 개선 제안
description: 새 기능 아이디어나 기존 코드의 개선을 제안해주세요. (MLX 포팅, 테스트 정리 등)
title: "[FEAT] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        DeZero를 더 좋게 만들 아이디어를 환영합니다!
        이 레포는 학습용 포크이므로, 원본 책 정정도 좋고 — MLX 백엔드 추가, 테스트 정리, 문서 보강 등 뭐든 좋아요.

  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제 / 동기
      description: 왜 이 제안을 하게 됐는지부터 적어주세요.
      placeholder: "예: CuPy가 macOS에서 안 돼서, M시리즈 칩에서는 DeZero GPU 가속을 못 쓰고 있다..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 제안하는 해결책
      description: 어떻게 바꾸면 좋을지 구체적으로.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 고려했던 대안
      description: 다른 접근도 생각해봤다면 적어주세요.

  - type: dropdown
    id: category
    attributes:
      label: 작업 성격
      options:
        - 🚀 새 백엔드 / 새 기능 (예: MLX 포팅)
        - ♻️ 리팩토링 / 테스트 정리
        - 📚 문서 / 주석 / 학습 자료
        - ⚡ 성능 / 호환성 개선
        - 🔧 인프라 (uv, CI 등)
    validations:
      required: true

  - type: input
    id: scope
    attributes:
      label: 예상 작업 범위 (선택)
      placeholder: "예: dezero/cuda.py를 MLX 백엔드로 교체, 또는 tests/test_*.py에서 chainer import 제거"

  - type: checkboxes
    id: terms
    attributes:
      label: 확인 사항
      options:
        - label: 비슷한 이슈가 이미 있는지 검색했습니다.
          required: true
