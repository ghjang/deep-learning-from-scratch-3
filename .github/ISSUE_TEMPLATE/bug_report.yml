name: 🐛 버그 리포트
description: DeZero 실행 중 마주친 오동작/오류를 알려주세요.
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        감사합니다! 아래 항목을 채워주세요.
        환경 정보는 `uv run python -c "import sys, numpy, matplotlib; print(sys.version, numpy.__version__, matplotlib.__version__)"`로 쉽게 확인할 수 있어요.

  - type: textarea
    id: what-happened
    attributes:
      label: 무슨 일이 있었나요?
      description: 어떤 동작을 기대했고, 실제로는 어떻게 됐는지 적어주세요.
      placeholder: |
        기대한 동작: ...
        실제 동작: ...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 재현 방법
      description: 버그를 다시 만들 수 있는 최소한의 절차/코드.
      placeholder: |
        1. `uv run python steps/stepNN.py` 실행
        2. ...
        ```python
        # 최소 재현 코드
        ```
    validations:
      required: true

  - type: input
    id: step
    attributes:
      label: 관련 단계 (step 번호)
      placeholder: "예: step31.py, 또는 dezero/core.py의 Function 클래스"

  - type: textarea
    id: env
    attributes:
      label: 환경 정보
      description: OS, Python, NumPy, Matplotlib 버전 등. 가능한 한 채워주세요.
      value: |
        - OS:
        - Python:
        - NumPy:
        - Matplotlib:
        - uv:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 로그 / 에러 메시지
      description: 터미널 에러 전문을 스크롤해 주세요. (스택 트레이스 포함)
      render: shell

  - type: dropdown
    id: severity
    attributes:
      label: 심각도
      options:
        - 🔥 치명적 (실행 자체가 안 됨)
        - ⚠️ 주요 (결과가 잘못 나옴)
        - 💧 사소 (웬만하면 넘어갈 수 있음)
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: 확인 사항
      options:
        - label: 비슷한 이슈가 이미 있는지 검색했습니다.
          required: true
