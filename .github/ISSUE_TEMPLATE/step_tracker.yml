name: 📌 Step 진행 추적
description: 특정 step(step01~60)의 학습 진행을 추적하는 마일스톤 이슈. 새 step 시작할 때 생성.
title: "[STEP] stepNN 진행 - "
labels: ["step", "learning"]
body:
  - type: markdown
    attributes:
      value: |
        이 이슈는 **특정 step의 학습 진행을 추적**하는 마일스톤용입니다.
        새 step을 시작할 때 생성하세요.

        워크플로:
        1. 이슈 생성 → `LEARNING_PROGRESS.md` 해당 행의 Issue 컬럼에 이슈 링크 등록
        2. 진행 중 질문/막힘은 이 이슈에 코멘트로 기록
        3. `LEARNING_NOTES.md` 해당 step 헤딩 아래 자유 노트 작성
        4. 완료 시 이슈 close + `LEARNING_PROGRESS.md` 상태 ✅로 변경

  - type: input
    id: step-number
    attributes:
      label: Step 번호
      description: 예) step01, step31
      placeholder: "stepNN"
    validations:
      required: true

  - type: input
    id: topic
    attributes:
      label: 주제 (LEARNING_PROGRESS.md에서 복사)
      placeholder: "예: [1고지] 테니스 공 같은 '상자' (Variable 도입)"

  - type: dropdown
    id: status
    attributes:
      label: 현재 상태
      options:
        - 🔄 진행 중
        - ⚠️ 막힘
        - ✅ 완료
        - ⏭ 건너뜀
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: 이 step의 목표
      description: 책을 읽고 얻고 싶은 것 한두 문장.
      placeholder: "예: Variable 클래스가 왜 필요한지 이해하고, rezero/core_simple.py에 최소 구현하기"

  - type: textarea
    id: questions
    attributes:
      label: 진행 중 질문 / 막힌 점 (계속 업데이트)
      description: step 진행하다 막히면 여기에 코멘트를 계속 달아가며 기록.
      placeholder: |
        - [ ] 왜 __getattr__을 쓰는 거지?
        - [ ] backward에서 generation 정렬이 필요한 이유?
        - ✅ 해결: numpy ndarray vs Variable 구분 이해함

  - type: textarea
    id: log
    attributes:
      label: 진행 로그 (타임스탬프 + 메모)
      description: 언제 무엇을 했는지. 자유 형식.
      placeholder: |
        - 2026-07-21: 책 읽기 시작. Variable 클래스 개념 파악
        - 2026-07-22: rezero/core_simple.py에 초안 작성
        - 2026-07-23: gradient_check 통과

  - type: input
    id: progress-link
    attributes:
      label: LEARNING_PROGRESS.md 링크 (해당 행)
      placeholder: "해당 step 행의 Issue 컬럼에 이 이슈 링크를 반대로 등록하세요"
